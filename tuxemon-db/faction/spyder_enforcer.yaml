# slug: Unique ID of the faction (example: "faction_enforcers")
#       Must have a translation entry in base.po with msgid = slug.
# kind: Type of faction (enum: gym, team, league, club, village, organization, elite, academy)
#        Example: "organization"
# alignment: Alignment of the faction (enum: heroic, villainous, rogue, neutral, chaotic, lawful)
#        Example: "chaotic"
# badge_id: Optional badge ID associated with the faction (example: "enforcer_badge")
# leader_char: Optional slug of the faction leader NPC
#       Must exist in the NPC database and also be listed in members with a reputation score.
# ranks: List of rank steps based on reputation thresholds
#   title: Rank title (example: "Rookie", "Agent")
#   threshold: Minimum reputation required for this rank (example: 50)
#   requirement: Optional additional requirements
#       min_reputation: Minimum reputation required (example: 60)
#       variables: Optional list of variables affecting requirements
# members: List of NPC slugs belonging to this faction
#        Each NPC slug must exist in the NPC database.
# reputation: Mapping of NPC slugs to their reputation scores
#        Every member must have a reputation entry.
# relations: Relationships with other factions
#        Keys: faction slugs; Values: relation status (enum: ally, rival, hostile, neutral, unknown)
# public_reputation: General public reputation score of the faction (integer, default 0)

