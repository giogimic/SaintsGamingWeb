# slug: Unique identifier for this dialogue style (example: "default", "black-orange")
#        Must have a translation entry in base.po with msgid = slug.
# bg_color: Background RGB color in "R:G:B" format (example: "248:248:248" for light gray)
# font_color: Text RGB color in "R:G:B" format (example: "10:10:10" for near black)
# font_shadow_color: Shadow RGB color in "R:G:B" format (example: "192:192:192" for medium gray)
# border_slug: Name of the border style (example: "borders", "borders-black")
#        Must correspond to a valid border resource file at gfx/borders/<border_slug>.png
# border_path: Path to the border image file (example: "gfx/borders/borders.png")
#        File MUST exist in the filesystem and match BORDERS_SIZE dimensions.
# line_spacing: Integer spacing between lines (example: 0 for default, 4 for extra spacing)

- bg_color: 248:248:248
  border_path: gfx/borders/borders.png
  border_slug: borders
  font_color: '10:10:10'
  font_shadow_color: 192:192:192
  line_spacing: 0
  slug: default
